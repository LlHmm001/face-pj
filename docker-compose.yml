version: '3.8'

services:
  face-recognition:
    build: .
    container_name: face-recognition-app
    ports:
      - "8000:8000"
    volumes:
      - ./photos:/app/photos
      - ./face_recognition.db:/app/face_recognition.db
    environment:
      - DATABASE_URL=sqlite:///./face_recognition.db
      - PHOTOS_DIR=./photos
    restart: unless-stopped