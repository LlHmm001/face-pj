version: "3.8"

services:
  face-recognition:
    build:
      context: .
      dockerfile: Dockerfile
    image: llhmm001/face-recognition:latest
    container_name: face-recognition
    ports:
      - "8000:8000"
    volumes:
      - ./photos:/app/photos
      - face_data:/data
    environment:
      - DATABASE_URL=sqlite:////data/face_recognition.db
      - PHOTOS_DIR=/app/photos
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

volumes:
  face_data:
