version: "3.8"

services:
  # ============================================
  # 主应用服务
  # ============================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: llhmm001/face-recognition:latest
    container_name: ${APP_NAME}-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - PHOTOS_DIR=${PHOTOS_DIR}
      - PORT=${APP_PORT}
    volumes:
      - photos_data:${PHOTOS_DIR}
      - db_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${APP_PORT}/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - face-network
    # 只在开发环境挂载代码目录进行热更新
    # volumes:
    #   - ./app:/app/app
    #   - ./static:/app/static

  # ============================================
  # Nginx 反向代理（可选，生产环境推荐）
  # ============================================
  nginx:
    image: nginx:1.25-alpine
    container_name: ${APP_NAME}-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT}:80"
      # - "${NGINX_SSL_PORT}:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      # - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - face-network

  # ============================================
  # Redis 缓存（可选）
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: ${APP_NAME}-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    command: redis-server --appendonly yes ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - face-network

# ============================================
# 数据卷配置
# ============================================
volumes:
  photos_data:
    driver: local
  db_data:
    driver: local
  redis_data:
    driver: local

# ============================================
# 网络配置
# ============================================
networks:
  face-network:
    driver: bridge
